name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Ruff
        run: uv tool install ruff

      - name: Run Ruff linter
        run: uv tool run ruff check --ignore=DJ001 --output-format=json . > ruff-report.json || true

      - name: Run Ruff linter (console)
        run: uv tool run ruff check --ignore=DJ001 .

      - name: Run Ruff formatter check
        run: uv tool run ruff format --check .

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ruff-lint-report
          path: backend/ruff-report.json

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --format json --output-file eslint-report.json || true

      - name: Run ESLint (console)
        run: npm run lint

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eslint-report
          path: frontend/eslint-report.json

  backend-test:
    name: Backend Tests
    needs: backend-lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with report
        run: uv run pytest --junitxml=test-report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-report
          path: backend/test-report.xml

  frontend-test:
    name: Frontend Tests
    needs: frontend-lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare Nuxt
        run: npx nuxt prepare

      - name: Run unit tests with report
        run: npm run test:unit -- --reporter=junit --outputFile=test-report.xml --passWithNoTests

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-test-report
          path: frontend/test-report.xml

  security-scan:
    name: Security Scan
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy filesystem scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./backend
          format: json
          output: trivy-backend-report.json
          severity: CRITICAL,HIGH

      - name: Run Trivy filesystem scan (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./frontend
          format: json
          output: trivy-frontend-report.json
          severity: CRITICAL,HIGH

      - name: Run Trivy scan (console - backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./backend
          severity: CRITICAL
          exit-code: 1

      - name: Run Trivy scan (console - frontend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./frontend
          severity: CRITICAL
          exit-code: 1

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-reports
          path: |
            trivy-backend-report.json
            trivy-frontend-report.json

  build-backend:
    name: Build Backend Docker Image
    needs: security-scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase repo name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}

  build-frontend:
    name: Build Frontend Docker Image
    needs: security-scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase repo name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}

  push-images:
    name: Push Docker Images
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase repo name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
